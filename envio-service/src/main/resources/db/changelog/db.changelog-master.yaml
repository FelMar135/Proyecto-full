databaseChangeLog:
  - changeSet:
      id: 001-create-envio-table
      author: matias
      changes:
        - createTable:
            tableName: envio
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: orden_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: direccion_envio
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: comuna
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: ciudad
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: empresa_transportista
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: numero_seguimiento
                  type: VARCHAR(80)

              - column:
                  name: estado
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: fecha_envio
                  type: DATETIME
                  constraints:
                    nullable: false

              - column:
                  name: fecha_entrega_estimada
                  type: DATETIME

  - changeSet:
      id: 002-insert-envios
      author: matias
      changes:
        - insert:
            tableName: envio
            columns:
              - column:
                  name: orden_id
                  valueNumeric: 1
