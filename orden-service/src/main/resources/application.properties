spring.application.name=orden-service
server.port=9095

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/bd_orden?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Comunicacion entre microservicios usuario y carrito
usuario.service.url=http://localhost:9091
carrito.service.url=http://localhost:9092

# Logging
logging.level.root=INFO
logging.level.com.example.orden_service=DEBUG

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs