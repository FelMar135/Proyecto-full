databaseChangeLog:
  - changeSet:
      id: 001-create-orden-table
      author: matias
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: orden
      changes:
        - createTable:
            tableName: orden
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: carrito_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: total
                  type: DOUBLE
                  constraints:
                    nullable: false

              - column:
                  name: estado
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-insert-ordenes
      author: matias
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM orden
      changes:
        - insert:
            tableName: orden
            columns:
              - column:
                  name: usuario_id
                  valueNumeric: 1
              - column:
                  name: carrito_id
                  valueNumeric: 1
              - column:
                  name: total
                  valueNumeric: 399990
              - column:
                  name: estado
                  value: "CREADA"

        - insert:
            tableName: orden
            columns:
              - column:
                  name: usuario_id
                  valueNumeric: 2
              - column:
                  name: carrito_id
                  valueNumeric: 2
              - column:
                  name: total
                  valueNumeric: 899990
              - column:
                  name: estado
                  value: "PAGADA"

        - insert:
            tableName: orden
            columns:
              - column:
                  name: usuario_id
                  valueNumeric: 3
              - column:
                  name: carrito_id
                  valueNumeric: 3
              - column:
                  name: total
                  valueNumeric: 1299990
              - column:
                  name: estado
                  value: "ENVIADA"