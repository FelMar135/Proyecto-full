spring.application.name=resena-service
server.port=9097

spring.datasource.url=jdbc:mysql://localhost:3306/bd_reserva?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

usuario.service.url=http://localhost:9091/
producto.service.url=http://localhost:9093/

logging.level.root=INFO
logging.level.com.example.resena_service=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs