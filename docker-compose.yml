services:

  mysql:
    image: mysql:8.0
    container_name: mysql-gpustore
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    networks:
      - gpustore-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "9094:9094"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "9091:9091"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_usuario?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  producto-service:
    build: ./producto-service
    container_name: producto-service
    ports:
      - "9093:9093"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_producto?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  carrito-service:
    build: ./carrito-service
    container_name: carrito-service
    ports:
      - "9092:9092"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_carrito?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      PRODUCTO_SERVICE_URL: http://producto-service:9093
      USUARIO_SERVICE_URL: http://user-service:9091
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
      producto-service:
        condition: service_started
    networks:
      - gpustore-net

  orden-service:
    build: ./orden-service
    container_name: orden-service
    ports:
      - "9095:9095"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_orden?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  pago-service:
    build: ./pago-service
    container_name: pago-service
    ports:
      - "9096:9096"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_pago?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      ORDEN_SERVICE_URL: http://orden-service:9095
    depends_on:
      mysql:
        condition: service_healthy
      orden-service:
        condition: service_started
    networks:
      - gpustore-net

  envio-service:
    build: ./envio-service
    container_name: envio-service
    ports:
      - "9099:9099"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_envio?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      ORDEN_SERVICE_URL: http://orden-service:9095
    depends_on:
      mysql:
        condition: service_healthy
      orden-service:
        condition: service_started
    networks:
      - gpustore-net

  boleta-service:
    build: ./boleta-service
    container_name: boleta-service
    ports:
      - "9098:9098"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_boleta?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      USUARIO_SERVICE_URL: http://user-service:9091
      ORDEN_SERVICE_URL: http://orden-service:9095
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
      orden-service:
        condition: service_started
    networks:
      - gpustore-net

  resena-service:
    build: ./resena-service
    container_name: resena-service
    ports:
      - "9097:9097"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_resena?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      USUARIO_SERVICE_URL: http://user-service:9091
      PRODUCTO_SERVICE_URL: http://producto-service:9093
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
      producto-service:
        condition: service_started
    networks:
      - gpustore-net

  soporte-service:
    build: ./soporte-service
    container_name: soporte-service
    ports:
      - "9100:9100"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_soporte?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_LIQUIBASE_USER: root
      SPRING_LIQUIBASE_PASSWORD: root
      USUARIO_SERVICE_URL: http://user-service:9091
      ORDEN_SERVICE_URL: http://orden-service:9095
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
      orden-service:
        condition: service_started
    networks:
      - gpustore-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9090:9090"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_SECRET_KEY: esta_es_mi_compleja_clave_secreta

      AUTH_SERVICE_URL: http://auth-service:9094
      USUARIO_SERVICE_URL: http://user-service:9091
      CARRITO_SERVICE_URL: http://carrito-service:9092
      PRODUCTO_SERVICE_URL: http://producto-service:9093
      ORDEN_SERVICE_URL: http://orden-service:9095
      PAGO_SERVICE_URL: http://pago-service:9096
      RESENA_SERVICE_URL: http://resena-service:9097
      BOLETA_SERVICE_URL: http://boleta-service:9098
      ENVIO_SERVICE_URL: http://envio-service:9099
      SOPORTE_SERVICE_URL: http://soporte-service:9100

    depends_on:
      - auth-service
      - user-service
      - carrito-service
      - producto-service
      - orden-service
      - pago-service
      - envio-service
      - boleta-service
      - resena-service
      - soporte-service

    networks:
      - gpustore-net

networks:
  gpustore-net:
    driver: bridge