  soporte-service:
    image: soporte-service
    container_name: soporte-service
    restart: always
    ports:
      - "9100:9100"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_soporte?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      USER_SERVICE_URL: "http://user-service:9091"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "9090:9090"
    environment:
      USER_SERVICE_URL: "http://user-service:9091"
      CARRITO_SERVICE_URL: "http://carrito-service:9092"
      PRODUCTO_SERVICE_URL: "http://producto-service:9093"
      AUTH_SERVICE_URL: "http://auth-service:9094"
      ORDEN_SERVICE_URL: "http://orden-service:9095"
      PAGO_SERVICE_URL: "http://pago-service:9096"
      RESENA_SERVICE_URL: "http://resena-service:9097"
      BOLETA_SERVICE_URL: "http://boleta-service:9098"
      ENVIO_SERVICE_URL: "http://envio-service:9099"
      SOPORTE_SERVICE_URL: "http://soporte-service:9100"
      JWT_SECRET: "esta_es_mi_compleja_clave_secreta"
    depends_on:
      - user-service
      - carrito-service
      - producto-service
      - auth-service
      - orden-service
      - pago-service
      - resena-service
      - boleta-service
      - envio-service
      - soporte-service
    networks:
      - gpustore-net

volumes:
  mysql_data:

networks:
  gpustore-net:
    driver: bridge