services:
  mysql:
    image: mysql:8.4
    container_name: gpustore-mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gpustore-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  user-service:
    image: user-service
    container_name: user-service
    restart: always
    ports:
      - "9091:9091"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  carrito-service:
    image: carrito-service
    container_name: carrito-service
    restart: always
    ports:
      - "9092:9092"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_carrito?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      USER_SERVICE_URL: "http://user-service:9091"
      PRODUCTO_SERVICE_URL: "http://producto-service:9093"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  producto-service:
    image: producto-service
    container_name: producto-service
    restart: always
    ports:
      - "9093:9093"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_producto?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  auth-service:
    image: auth-service
    container_name: auth-service
    restart: always
    ports:
      - "9094:9094"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      JWT_SECRET: "esta_es_mi_compleja_clave_secreta"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  orden-service:
    image: orden-service
    container_name: orden-service
    restart: always
    ports:
      - "9095:9095"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_orden?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      USER_SERVICE_URL: "http://user-service:9091"
      CARRITO_SERVICE_URL: "http://carrito-service:9092"
      PRODUCTO_SERVICE_URL: "http://producto-service:9093"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  pago-service:
    image: pago-service
    container_name: pago-service
    restart: always
    ports:
      - "9096:9096"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_pago?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      ORDEN_SERVICE_URL: "http://orden-service:9095"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  resena-service:
    image: resena-service
    container_name: resena-service
    restart: always
    ports:
      - "9097:9097"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_resena?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      USER_SERVICE_URL: "http://user-service:9091"
      PRODUCTO_SERVICE_URL: "http://producto-service:9093"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  boleta-service:
    image: boleta-service
    container_name: boleta-service
    restart: always
    ports:
      - "9098:9098"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_boleta?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      ORDEN_SERVICE_URL: "http://orden-service:9095"
      PAGO_SERVICE_URL: "http://pago-service:9096"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpustore-net

  envio-service:
    image: envio-service
    container_name: envio-service
    restart: always
    ports:
      - "9099:9099"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/bd_envio?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
