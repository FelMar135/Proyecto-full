spring.application.name=pago-service
server.port=9096

# Perfil activo para ejecutar DataLoader
spring.profiles.active=dev

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/bd_pago?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

# Comunicacion con orden-service
orden.service.url=http://localhost:9095

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.root=INFO
logging.level.com.example.pago_service=DEBUG