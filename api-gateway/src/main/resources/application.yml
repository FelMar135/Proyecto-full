server:
  port: 9090

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: esta_es_mi_compleja_clave_secreta

  cloud:
    gateway:
      routes:

        # =========================
        # RUTAS NORMALES
        # =========================

        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:9094}
          predicates:
            - Path=/auth,/auth/**

        - id: usuario-service
          uri: ${USUARIO_SERVICE_URL:http://localhost:9091}
          predicates:
            - Path=/usuarios,/usuarios/**

        - id: carrito-service
          uri: ${CARRITO_SERVICE_URL:http://localhost:9092}
          predicates:
            - Path=/carritos,/carritos/**

        - id: producto-service-gpus
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:9093}
          predicates:
            - Path=/gpus,/gpus/**

        - id: producto-service-categorias
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:9093}
          predicates:
            - Path=/categorias,/categorias/**

        - id: orden-service
          uri: ${ORDEN_SERVICE_URL:http://localhost:9095}
          predicates:
            - Path=/ordenes,/ordenes/**

        - id: pago-service
          uri: ${PAGO_SERVICE_URL:http://localhost:9096}
          predicates:
            - Path=/pagos,/pagos/**

        - id: resena-service
          uri: ${RESENA_SERVICE_URL:http://localhost:9097}
          predicates:
            - Path=/resenas,/resenas/**

        - id: boleta-service
          uri: ${BOLETA_SERVICE_URL:http://localhost:9098}
          predicates:
            - Path=/boletas,/boletas/**

        - id: envio-service
          uri: ${ENVIO_SERVICE_URL:http://localhost:9099}
          predicates:
            - Path=/envios,/envios/**

        - id: soporte-service
          uri: ${SOPORTE_SERVICE_URL:http://localhost:9100}
          predicates:
            - Path=/soporte,/soporte/**

        # =========================
        # RUTAS PARA SWAGGER / API DOCS
        # =========================

        - id: auth-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:9094}
          predicates:
            - Path=/docs/auth/v3/api-docs
          filters:
            - RewritePath=/docs/auth/v3/api-docs, /v3/api-docs

        - id: usuario-docs
          uri: ${USUARIO_SERVICE_URL:http://localhost:9091}
          predicates:
            - Path=/docs/usuarios/v3/api-docs
          filters:
            - RewritePath=/docs/usuarios/v3/api-docs, /v3/api-docs

        - id: carrito-docs
          uri: ${CARRITO_SERVICE_URL:http://localhost:9092}
          predicates:
            - Path=/docs/carritos/v3/api-docs
          filters:
            - RewritePath=/docs/carritos/v3/api-docs, /v3/api-docs

        - id: producto-docs
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:9093}
          predicates:
            - Path=/docs/productos/v3/api-docs
          filters:
            - RewritePath=/docs/productos/v3/api-docs, /v3/api-docs

        - id: orden-docs
          uri: ${ORDEN_SERVICE_URL:http://localhost:9095}
          predicates:
            - Path=/docs/ordenes/v3/api-docs
          filters:
            - RewritePath=/docs/ordenes/v3/api-docs, /v3/api-docs

        - id: pago-docs
          uri: ${PAGO_SERVICE_URL:http://localhost:9096}
          predicates:
            - Path=/docs/pagos/v3/api-docs
          filters:
            - RewritePath=/docs/pagos/v3/api-docs, /v3/api-docs

        - id: resena-docs
          uri: ${RESENA_SERVICE_URL:http://localhost:9097}
          predicates:
            - Path=/docs/resenas/v3/api-docs
          filters:
            - RewritePath=/docs/resenas/v3/api-docs, /v3/api-docs

        - id: boleta-docs
          uri: ${BOLETA_SERVICE_URL:http://localhost:9098}
          predicates:
            - Path=/docs/boletas/v3/api-docs
          filters:
            - RewritePath=/docs/boletas/v3/api-docs, /v3/api-docs

        - id: envio-docs
          uri: ${ENVIO_SERVICE_URL:http://localhost:9099}
          predicates:
            - Path=/docs/envios/v3/api-docs
          filters:
            - RewritePath=/docs/envios/v3/api-docs, /v3/api-docs

        - id: soporte-docs
          uri: ${SOPORTE_SERVICE_URL:http://localhost:9100}
          predicates:
            - Path=/docs/soporte/v3/api-docs
          filters:
            - RewritePath=/docs/soporte/v3/api-docs, /v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /docs/auth/v3/api-docs
      - name: Usuario Service
        url: /docs/usuarios/v3/api-docs
      - name: Carrito Service
        url: /docs/carritos/v3/api-docs
      - name: Producto Service
        url: /docs/productos/v3/api-docs
      - name: Orden Service
        url: /docs/ordenes/v3/api-docs
      - name: Pago Service
        url: /docs/pagos/v3/api-docs
      - name: Reseña Service
        url: /docs/resenas/v3/api-docs
      - name: Boleta Service
        url: /docs/boletas/v3/api-docs
      - name: Envío Service
        url: /docs/envios/v3/api-docs
      - name: Soporte Service
        url: /docs/soporte/v3/api-docs
  api-docs:
    path: /v3/api-docs