server:
  port: 9090

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: esta_es_mi_compleja_clave_secreta

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:9094
          predicates:
            - Path=/auth,/auth/**

        - id: usuario-service
          uri: http://localhost:9091
          predicates:
            - Path=/usuarios,/usuarios/**

        - id: carrito-service
          uri: http://localhost:9092
          predicates:
            - Path=/carritos,/carritos/**

        - id: producto-service-gpus
          uri: http://localhost:9093
          predicates:
            - Path=/gpus,/gpus/**

        - id: producto-service-categorias
          uri: http://localhost:9093
          predicates:
            - Path=/categorias,/categorias/**

        - id: orden-service
          uri: http://localhost:9095
          predicates:
            - Path=/ordenes,/ordenes/**

        - id: pago-service
          uri: ${PAGO_SERVICE_URL:http://localhost:9096}
          predicates:
            - Path=/pagos,/pagos/**

        - id: resena-service
          uri: http://localhost:9097
          predicates:
            - Path=/resenas,/resenas/**

        - id: boleta-service
          uri: http://localhost:9098
          predicates:
            - Path=/boletas,/boletas/**

        - id: envio-service
          uri: ${ENVIO_SERVICE_URL:http://localhost:9099}
          predicates:
            - Path=/envios,/envios/**

        - id: soporte-service
          uri: http://localhost:9100
          predicates:
            - Path=/soportes,/soportes/**