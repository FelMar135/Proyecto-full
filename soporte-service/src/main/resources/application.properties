spring.application.name=soporte-service
server.port=9100

spring.datasource.url=jdbc:mysql://localhost:3306/bd_soporte?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql

usuario.service.url=http://localhost:9091
orden.service.url=http://localhost:9095

logging.level.root=INFO
logging.level.com.example.soporte_service=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

config.stopBubbling = true
lombok.addLombokGeneratedAnnotation = true